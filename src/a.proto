syntax = "proto3";

message Person {
    string name = 1;
    int32 age = 2;
}

service AddressBookService{
    rpc AddPerson (Person) returns (Person);
    rpc GetPersonByName (GetPersonByNameRequest) returns (GetPersonByNameResponse);
}

message GetPersonByNameRequest {
    string name = 1;
}

message GetPersonByNameResponse {
    Person person = 1;
}