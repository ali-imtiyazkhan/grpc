version: '3.8'

services:
   node-app:
    build: .
    container_name: node-app
    ports:
      - "3000:3000"
    networks:
      - monitoring
    restart: always

   grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - monitoring
    restart: always


